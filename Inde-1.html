
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortillas Doña Flor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #fdf6e3;
            color: #333;
        }

        header {
            background-color: #d35400;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .producto {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 280px;
            padding: 20px;
            text-align: center;
        }

        .producto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .producto h3 {
            color: #d35400;
            margin-bottom: 10px;
        }

        .precio {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tortillas Doña Flor</h1>
        <p> Tortillas Frescas todos los días</p>
    </header>

    <div class="container">
        
        <!-- Producto 1 -->
        <div class="producto">
            <img src="https://lh3.googleusercontent.com/d/1PSl6bJYlFHkzr8v89rG5fydJSdh_MlBM" alt="Tortillas">
            <h3>Tortillas de Maíz</h3>
            <p>Recién hechas, suaves y deliciosas.</p>
            <div class="precio">$18.00 / Kilo</div>
        </div>

        <!-- Producto 2 -->
        <div class="producto">
            <img src="https://lh3.googleusercontent.com/d/1Wo_NCPgmuYmu7Ipi4t6Woe1x2ZVgRtja" alt="Tortillas Azules">
            <h3>Tortillas Azules</h3>
            <p>Con un sabor único y textura inigualable.</p>
            <div class="precio">$20.00 / Kilo</div>
        </div>

        <!-- Producto 3 -->
        <div class="producto">
            <img src="https://lh3.googleusercontent.com/d/1pSoTFOCOa8uE5KlpTSrPvbJUAR2BkHAN" alt="Tostadas">
            <h3>Tortillas de harina</h3>
            <p>frescas y deliciosas .</p>
            <div class="precio">$15.00 / kilo</div>
        </div>

    </div>

</body>
</html>
